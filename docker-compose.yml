services:
  postgres:
    image: postgres:16-alpine
    container_name: coin-collection-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
      POSTGRES_DB: ${DB_DATABASE:-coin_collection}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coin-collection-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-changeme123}@postgres:5432/${DB_DATABASE:-coin_collection}?schema=public
      JWT_SECRET: ${JWT_SECRET:-changeme123-change-this-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - "3000:3000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_thumbnails:/app/uploads/thumbnails
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - coin-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coin-collection-frontend
    ports:
      - "5173:5173"
    networks:
      - coin-network

volumes:
  postgres_data:
  backend_uploads:
  backend_thumbnails:

networks:
  coin-network:
    driver: bridge
